<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HFS Prayer Attendance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>HFS Prayer Attendance</h1>
        <p id="server-time" class="muted"></p>

        <div id="status-banner" class="status-banner"></div>

        <form id="attendance-form" class="form" autocomplete="off">
          <label for="name">Enter your name</label>
          <input id="name" name="name" type="text" maxlength="60" placeholder="e.g. Esther Johnson" required />
          <button type="submit">Submit Attendance</button>
        </form>
      </section>

      <section class="card">
        <h2>Attendance History</h2>
        <div class="history-controls">
          <label for="page-size">Show</label>
          <select id="page-size">
            <option value="5">5</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="all">All</option>
          </select>
          <span id="history-summary" class="muted"></span>
          <div class="pager-buttons">
            <button id="prev-page" type="button">Previous</button>
            <button id="next-page" type="button">Next</button>
          </div>
        </div>
        <div id="history" class="history"></div>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
